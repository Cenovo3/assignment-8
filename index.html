<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>What Food Are You?</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1 class="text-center mt-4">What Food Are You?</h1>

    <!-- Question 1 -->
    <!-- Start quiz element -->
    <div class="container d-flex justify-content-center" id="question-1">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">1. Pick a weekend activity:</h4>
        <div class="row g-2">
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="3">Go out with friends</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="1">Relax with a movie</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="2">Go for a hike</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="4">Try a new hobby</button></div>
        </div>
      </div>
    </div>
    <!-- End quiz element -->

    <!-- Question 2 -->
    <!-- Start quiz element -->
    <div class="container d-flex justify-content-center" id="question-2">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">2. Pick a favorite color:</h4>
        <div class="row g-2">
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="3">Red</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="1">Brown</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="2">Green</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="4">Blue</button></div>
        </div>
      </div>
    </div>
    <!-- End quiz element -->

    <!-- Question 3 -->
    <!-- Start quiz element -->
    <div class="container d-flex justify-content-center" id="question-3">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">3. Your go-to snack:</h4>
        <div class="row g-2">
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="3">Pizza slice</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="1">Chocolate bar</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="2">Fruit</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="4">Sushi roll</button></div>
        </div>
      </div>
    </div>
    <!-- End quiz element -->

    <!-- Question 4 -->
    <!-- Start quiz element -->
    <div class="container d-flex justify-content-center" id="question-4">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">4. How do friends describe you?</h4>
        <div class="row g-2">
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="3">Party starter</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="1">Sweet and supportive</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="2">Reliable</button></div>
          <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-points="4">Unique and creative</button></div>
        </div>
      </div>
    </div>
    <!-- End quiz element -->

    <!-- Show Results Button -->
    <div class="container d-flex justify-content-center">
      <button id="show-result" class="btn btn-success my-4">Show Results</button>
    </div>

    <!-- Result Container -->
    <div class="container d-flex justify-content-center">
      <div id="result-container" class="card p-4 mb-4" style="width: 75%; display: none;">
        <h3>Your Result:</h3>
        <p id="result-text"></p>
      </div>
    </div>

    <!-- Connect to JS -->
    <script src="./js/script.js"></script>
</body>
</html>
